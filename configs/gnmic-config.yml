username: admin
password: NokiaSrl1!
insecure: false
skip-verify: true
encoding: json_ietf
timeout: 10s

targets:
  srlswitch2:
    address: srlswitch2:57400
    
subscriptions:    
  srl-if-stats:
    mode: stream
    stream-mode: sample
    sample-interval: 5s
    paths:
      - /interface[name=*]/statistics/in-discarded-packets
      - /interface[name=*]/statistics/in-error-packets
      - /interface[name=*]/statistics/in-multicast-packets
      - /interface[name=*]/statistics/in-unicast-packets
      - /interface[name=*]/statistics/in-broadcast-packets
      - /interface[name=*]/traffic-rate

outputs:
  file_output:
    type: file
    filename: /data/if-stats-nokia.json
    format: json
    split-events: true      
