name: gnmi-comparativa

mgmt:
  network: gnmi
  ipv4-subnet: 172.110.110.0/24  
  
topology:
  nodes:
    # Nokia SRL Linux Layer 2 Device
    srlswitch:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      startup-config: configs/srlswitch.cfg

    # Nokia SRL Linux Layer 2 Device
    srlswitch2:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      startup-config: configs/srlswitch.cfg 
            
    # Nokia SRL Linux Router
    srlrouter:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      startup-config: configs/srlrouter.cfg
      
    #arista-router:
      #kind: arista_veos
      #mgmt-ipv4: 172.110.110.7
      #image: vrnetlab/arista_veos:4.35.1F
      #startup-config: configs/myconfig.txt      

    prometheus:
      kind: linux
      mgmt-ipv4: 172.110.110.42
      image: quay.io/prometheus/prometheus:v2.54.1
      binds:
        - config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      cmd: --config.file=/etc/prometheus/prometheus.yml
      ports:
        - 9090:9090

    grafana:
      kind: linux
      mgmt-ipv4: 172.110.110.43
      image: grafana/grafana:latest
      binds:
        - config/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
        - config/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
        #- config/grafana/dashboards:/var/lib/grafana/dashboards
      ports:
        - 3000:3000
      env:        
        # env vars to enable anonymous access
        GF_ORG_ROLE: "Admin"
        GF_ORG_NAME: "Main Org"
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
        GF_AUTH_ANONYMOUS: "true"
        GF_AUTH_OAUTH_AUTO_LOGIN: "true"    
              
    PC1:
      kind: linux
      image: docker.io/esanchezv/kaliipv6:latest
    
    traffic-gen:
      kind: linux
      image: docker.io/esanchezv/kaliipv6:latest
      exec:
         - ip -6 addr add 2001:db8:10::100/64 dev eth1
    
        
    gNMIc:
      kind: linux
      image: docker.io/esanchezv/hellt-gnmic:latest
      binds:
        - configs/gnmic-config.yml:/gnmic-config.yml:ro
      exec: 
        - mkdir /data
        - chmod +x /data
        
            
    
  links:
    - endpoints: ["srlrouter:e1-1", "srlswitch:e1-1"]
      #mtu: 1500
    #- endpoints: ["arista-router:eth1", "srlswitch:e1-2"]
      #mtu: 1500
    - endpoints: ["traffic-gen:eth1", "srlswitch:e1-5"]
      mtu: 1500
    - endpoints: ["PC1:eth1", "srlswitch2:e1-4"]
      mtu: 1500
    #- endpoints: ["cisco-router:Ethernet0/2", "srlswitch2:e1-3"]
      #mtu: 1500
    #- endpoints: ["arista-router:eth2", "srlswitch2:e1-2"]
      #mtu: 1500  
    - endpoints: ["srlrouter:e1-2", "srlswitch2:e1-1"]  
    - endpoints: ["gNMIc:eth1", "srlswitch2:e1-5"]
      mtu: 1500  
      
    
     
     
